<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>To do List</title>
</head>

<body>
  <div class="todo-container">
    <div class="todo-header">
      <h1>To Do List</h1>
      <p>Organize suas tarefas do dia</p>
    </div>

    <form class="todo-form">
      <input type="text" class="todo-input" placeholder="Digite uma nova tarefa..." />

      <button class="add-btn">Adicionar</button>
    </form>

    <ul class="todo-list">
      <li class="todo-item">
        <div class="todo-left">
          <input type="checkbox">
          <span class="task-text">Estudar HTML e CSS</span>
        </div>

        <div class="todo-actions">
          <button class="edit-btn">Editar</button>
          <button class="delete-btn">Excluir</button>
        </div>
      </li>

      <li class="todo-item completed">
        <div class="todo-left">
          <input type="checkbox" checked>
          <span class="task-text">Fazer exercícios</span>
        </div>

        <div class="todo-actions">
          <button class="edit-btn">Editar</button>
          <button class="delete-btn">Excluir</button>
        </div>
      </li>

      <li class="todo-item">
        <div class="todo-left">
          <input type="checkbox">
          <span class="task-text">Fazer tarefa de JavaScript</span>
        </div>

        <div class="todo-actions">
          <button class="edit-btn">Editar</button>
          <button class="delete-btn">Excluir</button>
        </div>
      </li>

    </ul>

    <p class="empty-message">Você tem 3 tarefas.</p>

  </div>

</html>
